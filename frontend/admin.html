<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Portefeuille Blockchain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c1a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #11162b;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .logo { font-size: 24px; font-weight: 700; }
        .logo span { color: #f5b042; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #11162b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: 700; color: #f5b042; }
        .stat-label { color: #8b8cae; margin-top: 5px; }
        .table-container {
            background: #11162b;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #f5b042; font-weight: 600; }
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
        }
        .btn-approve { background: rgba(16,185,129,0.2); color: #10b981; }
        .btn-approve:hover { background: #10b981; color: white; }
        .btn-reject { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-reject:hover { background: #ef4444; color: white; }
        .badge-pending { background: rgba(245,176,66,0.2); color: #f5b042; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-approved { background: rgba(16,185,129,0.2); color: #10b981; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-rejected { background: rgba(239,68,68,0.2); color: #ef4444; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: #11162b;
            padding: 30px;
            border-radius: 20px;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            background: #0a0c1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin: 10px 0;
        }
        .login-form .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f5b042, #e08e1a);
            color: #0a0c1a;
            font-weight: 600;
            border-radius: 40px;
            font-size: 16px;
        }
        .refresh-btn {
            background: rgba(245,176,66,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #f5b042;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #f5b042; color: #0a0c1a; }
        .seed-words {
            font-family: monospace;
            font-size: 11px;
            max-width: 200px;
            word-break: break-all;
            color: #8b8cae;
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="adminContent" style="display: none;">
        <div class="container">
            <div class="header">
                <div class="logo">🎲 <span>Admin</span> Blockchain</div>
                <div>
                    <button class="refresh-btn" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Actualiser</button>
                    <button class="btn btn-reject" onclick="logout()" style="padding:8px 16px; margin-left:10px;">Déconnexion</button>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-number" id="pendingUsers">0</div><div class="stat-label">En attente</div></div>
                <div class="stat-card"><div class="stat-number" id="approvedUsers">0</div><div class="stat-label">Approuvés</div></div>
            </div>
            
            <div class="table-container">
                <h3 style="margin-bottom: 15px;">📋 Demandes de synchronisation</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Statut</th>
                            <th>Mots (seed phrase)</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="loginPanel" class="login-form">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 Accès Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email admin" value="admin@blockchain.com">
        <input type="password" id="adminPassword" placeholder="Mot de passe admin">
        <button class="btn" onclick="adminLogin()">Se connecter</button>
        <p style="text-align:center; margin-top:15px; color:#8b8cae; font-size:12px;">Accès réservé au propriétaire</p>
    </div>

    <script>
        let adminToken = localStorage.getItem('adminToken');
        if (adminToken) checkAdminSession();
        
        async function checkAdminSession() {
            try {
                const res = await fetch(`/api/admin/verify`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('adminContent').style.display = 'block';
                    loadUsers();
                } else {
                    localStorage.removeItem('adminToken');
                }
            } catch(e) {}
        }
        
        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const res = await fetch(`/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', data.token);
                adminToken = data.token;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadUsers();
            } else {
                alert('Identifiants incorrects');
            }
        }
        
        async function loadUsers() {
            const res = await fetch(`/api/admin/users`, {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                const users = data.users;
                document.getElementById('totalUsers').innerText = users.length;
                document.getElementById('pendingUsers').innerText = users.filter(u => u.status === 'pending').length;
                document.getElementById('approvedUsers').innerText = users.filter(u => u.status === 'approved').length;
                renderUsersTable(users);
            }
        }
        
        function renderUsersTable(users) {
            const tbody = document.getElementById('usersTable');
            if (users.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:#8b8cae;">Aucune demande de synchronisation</td></tr>`;
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <span class="badge-${user.status || 'pending'}">
                            ${user.status === 'approved' ? '✅ Approuvé' : user.status === 'rejected' ? '❌ Rejeté' : '⏳ En attente'}
                        </span>
                    </td>
                    <td class="seed-words">${user.seed_phrase || 'Non renseigné'}</td>
                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                    <td>
                        ${user.status === 'pending' ? `
                            <button class="btn btn-approve" onclick="approveUser(${user.id})"><i class="fas fa-check"></i> Approuver</button>
                            <button class="btn btn-reject" onclick="rejectUser(${user.id})"><i class="fas fa-times"></i> Rejeter</button>
                        ` : `
                            <span style="color:#8b8cae; font-size:12px;">${user.status === 'approved' ? '✅ Traité' : '❌ Rejeté'}</span>
                        `}
                    </td>
                </tr>
            `).join('');
        }
        
        async function approveUser(userId) {
            if (!confirm('Approuver cette synchronisation ?')) return;
            const res = await fetch(`/api/admin/approve-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId })
            });
            const data = await res.json();
            if (data.success) {
                alert('✅ Synchronisation approuvée !');
                loadUsers();
            } else {
                alert('Erreur');
            }
        }
        
        async function rejectUser(userId) {
            if (!confirm('Rejeter cette synchronisation ?')) return;
            const res = await fetch(`/api/admin/reject-user`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId })
            });
            const data = await res.json();
            if (data.success) {
                alert('❌ Synchronisation rejetée');
                loadUsers();
            } else {
                alert('Erreur');
            }
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            location.reload();
        }
    </script>
</body>
</html>
